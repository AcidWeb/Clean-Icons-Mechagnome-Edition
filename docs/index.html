<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Clean Icons - Mechagnome Edition</title>
        <script defer src="https://unpkg.com/img-comparison-slider@8/dist/index.js"></script>
        <link rel="stylesheet" href="https://unpkg.com/img-comparison-slider@8/dist/styles.css">
        <style>
            body {
                background-color: Silver;
            }
            .slider {
                --divider-width: 5px;
                --divider-color: Red;
                box-shadow: 0px 0px 15px 5px Black;
            }
            .slider:focus .custom-handle {
                outline: none;
                opacity: 0;
            }
            .container {
                position: absolute;
                top: 50%;
                left: 50%;
                -moz-transform: translateX(-50%) translateY(-50%);
                -webkit-transform: translateX(-50%) translateY(-50%);
                transform: translateX(-50%) translateY(-50%);
            }
        </style>
    </head>
    <body>
        <div class="container">
            <img-comparison-slider class="slider">
                <img alt="New" slot="first" src="New.png">
                <img alt="Old" slot="second" src="Old.png">
                <svg slot="handle" class="custom-handle" xmlns="http://www.w3.org/2000/svg" width="100" viewBox="-8 -3 16 6">
                    <path stroke="Red" d="M -5 -2 L -7 0 L -5 2 M -5 -2 L -5 2 M 5 -2 L 7 0 L 5 2 M 5 -2 L 5 2" stroke-width="1" fill="Red" vector-effect="non-scaling-stroke"></path>
                </svg>
            </img-comparison-slider>
        </div>
    </body>
</html>
